services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - mi-hub-net

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL_PRIMARY: ${LLM_MODEL_PRIMARY}
      LLM_MODEL_FALLBACK: ${LLM_MODEL_FALLBACK}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      DEMO_MODE: ${DEMO_MODE}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./agents:/app/agents
      - ./data:/app/data
      - ./scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      retries: 5
      start_period: 20s
    networks:
      - mi-hub-net

  agent-worker:
    build:
      context: .
      dockerfile: agents/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL_PRIMARY: ${LLM_MODEL_PRIMARY}
      LLM_MODEL_FALLBACK: ${LLM_MODEL_FALLBACK}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    volumes:
      - ./agents:/app/agents
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mi-hub-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE: http://localhost:8000
    networks:
      - mi-hub-net

volumes:
  postgres_data:

networks:
  mi-hub-net:
    driver: bridge
